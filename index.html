<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casa Pepa – Taberna Biznaguera</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:    #F0EDE6;
      --cream2:   #E8E4DC;
      --navy:     #1E2D4A;
      --gold:     #B8913A;
      --gold-lt:  #D4A84B;
      --card-bg:  rgba(255,255,255,0.45);
      --shadow:   0 2px 12px rgba(30,45,74,0.08);
    }

    body {
      background-color: var(--cream);
      font-family: 'EB Garamond', Georgia, serif;
      min-height: 100vh;
      color: var(--navy);
    }

    /* ── LANGUAGE SWITCHER ── */
    .lang-bar {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 14px 24px 0;
    }
    .lang-btn {
      background: none;
      border: 1.5px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      padding: 4px 8px;
      font-size: 24px;
      line-height: 1;
      transition: border-color 0.2s, transform 0.15s;
      opacity: 0.55;
    }
    .lang-btn:hover { opacity: 0.9; transform: scale(1.08); }
    .lang-btn.active {
      border-color: var(--gold);
      opacity: 1;
      box-shadow: 0 0 0 2px rgba(184,145,58,0.18);
    }

    /* ── WRAPPER ── */
    .page {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }

    /* ── HEADER / LOGO ── */
    .header {
      text-align: center;
      padding: 28px 0 10px;
    }
    .ornament {
      display: block;
      width: 220px;
      margin: 0 auto 6px;
      opacity: 0.85;
    }
    .brand-title {
      font-family: 'Cinzel', serif;
      font-size: 2.6rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--navy);
      line-height: 1;
    }
    .brand-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.15rem;
      color: var(--navy);
      margin-top: 2px;
      letter-spacing: 0.02em;
    }
    .card-sub { transition: opacity 0.2s; }
    .ornament-bottom {
      display: block;
      width: 200px;
      margin: 8px auto 0;
      opacity: 0.7;
    }
    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.05rem;
      letter-spacing: 0.08em;
      color: var(--navy);
      margin-top: 20px;
    }

    /* ── SECTION LABEL ── */
    .section-label {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0 18px;
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      color: var(--navy);
      opacity: 0.7;
    }
    .section-label::before,
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      opacity: 0.5;
    }

    /* ── MENU CARDS ── */
    .menu-list { display: flex; flex-direction: column; gap: 14px; }

    .menu-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--card-bg);
      border: 1px solid rgba(184,145,58,0.18);
      border-radius: 10px;
      padding: 18px 20px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      box-shadow: var(--shadow);
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }
    .menu-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, transparent 60%);
      pointer-events: none;
    }
    .menu-card:hover {
      background: rgba(255,255,255,0.65);
      box-shadow: 0 4px 20px rgba(30,45,74,0.13);
      transform: translateY(-1px);
    }
    .menu-card:active { transform: translateY(0); }

    .card-icon {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: var(--cream2);
      border: 1px solid rgba(184,145,58,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .card-text { flex: 1; }
    .card-name {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--navy);
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .card-sub {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      letter-spacing: 0.06em;
      color: var(--navy);
      font-weight: 600;
      margin-top: 3px;
    }
    .card-arrow {
      color: var(--gold);
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    /* ── FOOTER ── */
    .footer {
      text-align: center;
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid rgba(184,145,58,0.25);
    }
    .footer-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
      margin-bottom: 8px;
    }
    .footer-text {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.25em;
      color: var(--navy);
      opacity: 0.5;
    }

    /* ── OVERLAY / CARTA PAGE ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--cream);
      z-index: 100;
      overflow-y: auto;
    }
    .overlay.open { display: block; }

    .overlay-inner {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px 24px 60px;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #c0392b;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: white;
      font-weight: 600;
      padding: 10px 18px;
      margin-bottom: 24px;
      transition: background 0.2s, transform 0.15s;
      box-shadow: 0 2px 8px rgba(192,57,43,0.3);
    }
    .back-btn:hover { background: #a93226; transform: translateY(-1px); }

    .carta-title {
      font-family: 'Cinzel', serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--navy);
      text-align: center;
      letter-spacing: 0.06em;
    }
    .carta-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.95rem;
      color: var(--gold);
      text-align: center;
      letter-spacing: 0.1em;
      margin-top: 4px;
      margin-bottom: 6px;
    }
    .carta-divider {
      width: 60px;
      height: 1px;
      background: var(--gold);
      margin: 14px auto 28px;
      opacity: 0.5;
    }

    /* image placeholder */
    .carta-img-placeholder {
      width: 100%;
      aspect-ratio: 3/4;
      background: var(--cream2);
      border: 2px dashed rgba(184,145,58,0.35);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--navy);
      opacity: 0.65;
      margin-bottom: 20px;
    }
    .placeholder-icon { font-size: 2.5rem; }
    .placeholder-label {
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-align: center;
      line-height: 1.6;
    }

    /* sample menu items */
    .menu-section { margin-bottom: 28px; }
    .menu-section-title {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--gold);
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(184,145,58,0.2);
    }
    .menu-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
      gap: 10px;
    }
    .item-info { flex: 1; }
    .item-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--navy);
    }
    .item-desc {
      font-family: 'EB Garamond', serif;
      font-size: 0.85rem;
      color: var(--navy);
      opacity: 0.65;
      font-style: italic;
    }
    .item-price {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      color: var(--gold);
      white-space: nowrap;
    }

    /* ── SVG ORNAMENTS (inline) ── */
    .svg-ornament { display: block; margin: 0 auto; }
  </style>
</head>

let currentLang = 'es';

function setLang(lang) {
  currentLang = lang;
  document.getElementById('btn-es').classList.toggle('active', lang === 'es');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');

  const t = T[lang];
  document.getElementById('section-label-text').textContent = t.sectionLabel;

  // update all back buttons
  document.querySelectorAll('.back-label').forEach(el => el.textContent = t.backLabel);

  // update all text nodes
  Object.keys(t).forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    if (id.startsWith('ph-')) {
      el.innerHTML = t[id].replace('\n', '<br>');
    } else {
      el.textContent = t[id];
    }
  });

  // switch images based on language
  const imgs = {
    'img-desayuno':  lang === 'es' ? 'DesayunosEsp.jpg'  : 'DesayunosIng.jpg',
    'img-bebida':    lang === 'es' ? 'BebidaEsp.jpg'     : 'BebidaIng.jpg',
    'img-comida':    lang === 'es' ? 'ComidaEsp.jpg'     : 'ComidaIng.jpg',
    'img-meriendas': lang === 'es' ? 'MeriendasEsp.jpg'  : 'MeriendasIng.jpg',
  };
  Object.keys(imgs).forEach(id => {
    const el = document.getElementById(id);
    if (el) el.src = imgs[id];
  });
}

function openCarta(name) {
  // set correct image for current language before opening
  const imgMap = {
    'desayuno':  currentLang === 'es' ? 'DesayunosEsp.jpg' : 'DesayunosIng.jpg',
    'bebida':    currentLang === 'es' ? 'BebidaEsp.jpg'    : 'BebidaIng.jpg',
    'comida':    currentLang === 'es' ? 'ComidaEsp.jpg'    : 'ComidaIng.jpg',
    'meriendas': currentLang === 'es' ? 'MeriendasEsp.jpg' : 'MeriendasIng.jpg',
  };
  if (imgMap[name]) {
    const el = document.getElementById('img-' + name);
    if (el) el.src = imgMap[name];
  }
  document.getElementById('overlay-' + name).classList.add('open');
  document.body.style.overflow = 'hidden';
  window.scrollTo(0,0);
}
function closeCarta(name) {
  document.getElementById('overlay-' + name).classList.remove('open');
  document.body.style.overflow = '';
}
